name: Create VPN Server
env:
  SSH_USER: ""               # leave blank to auto-generate
  SSH_PASS: ""               # leave blank to auto-generate
  OVPN_TCP_PORT: "443"
  OVPN_UDP_PORT: "1194"
  WG_PORT: "51820"
  WS_SSH_PORT: "80"
  ENABLE_WIREGUARD: "true"
  ENABLE_WS_SSH: "true"
  VPN_DNS_1: "1.1.1.1"
  VPN_DNS_2: "1.0.0.1"
  PASTEBIN_URL: "https://pastebin.com/raw/b73Szgit"   # <-- replace with your raw pastebin URL

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: "ngrok authtoken"
        required: true
      ssh_user:
        description: "SSH username (blank = use env or auto)"
        required: false
        default: ""
      ssh_pass:
        description: "SSH password (blank = use env or auto)"
        required: false
        default: ""
      enable_wireguard:
        description: "Enable WireGuard (true/false)"
        required: false
        default: "true"
      enable_ws_ssh:
        description: "Enable WebSocket SSH (true/false)"
        required: false
        default: "true"

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Fetch and run VPN script
        env:
          INPUT_USER: ${{ github.event.inputs.ssh_user }}
          INPUT_PASS: ${{ github.event.inputs.ssh_pass }}
          ENA_WG: ${{ github.event.inputs.enable_wireguard }}
          ENA_WS: ${{ github.event.inputs.enable_ws_ssh }}
          NGROK_TOKEN: ${{ github.event.inputs.ngrok_token }}
        run: |
          curl -fsSL "$PASTEBIN_URL" -o /tmp/vpn.sh
          chmod +x /tmp/vpn.sh
          bash /tmp/vpn.sh

      - name: Keep alive
        run: sleep 21400

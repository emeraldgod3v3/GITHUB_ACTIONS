name: VLESS Temp Server

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Custom name for this server (used in VLESS tag)"
        required: true
        default: "STSNOLOAD"
      port:
        description: "Container port to expose"
        required: false
        default: "8080"

jobs:
  run-vless:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Pull Docker image
        run: docker pull docker.io/mstrph28/sts-apimaya:latest

      - name: Run VLESS container
        run: |
          docker run -d \
            --name vless \
            -p ${{ github.event.inputs.port }}:${{ github.event.inputs.port }} \
            docker.io/mstrph28/sts-apimaya:latest
          sleep 8

      - name: Container logs
        run: docker logs vless

      - name: Fetch config from /pass route
        id: config
        run: |
          PORT=${{ github.event.inputs.port }}

          echo "Fetching config from http://localhost:${PORT}/pass ..."
          for i in $(seq 1 10); do
            RESPONSE=$(curl -sf http://localhost:${PORT}/pass || true)
            if [ -n "$RESPONSE" ]; then break; fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done

          if [ -z "$RESPONSE" ]; then
            echo "ERROR: Could not reach /pass endpoint. Container logs:"
            docker logs vless
            exit 1
          fi

          echo "Raw response:"
          echo "$RESPONSE"

          # Parse each value (using awk for reliable field extraction)
          UUID=$(echo "$RESPONSE"        | awk '/^UUID:/        {print $2}')
          PATH_SUFFIX=$(echo "$RESPONSE" | awk '/^PATH_SUFFIX:/ {print $2}')
          VLESS_PATH=$(echo "$RESPONSE"  | awk '/^VLESS_PATH:/  {print $2}')
          VMESS_PATH=$(echo "$RESPONSE"  | awk '/^VMESS_PATH:/  {print $2}')
          TROJAN_PATH=$(echo "$RESPONSE" | awk '/^TROJAN_PATH:/ {print $2}')
          SS_PATH=$(echo "$RESPONSE"     | awk '/^SS_PATH:/     {print $2}')

          echo "--- Parsed ---"
          echo "UUID        : $UUID"
          echo "PATH_SUFFIX : $PATH_SUFFIX"
          echo "VLESS_PATH  : $VLESS_PATH"
          echo "VMESS_PATH  : $VMESS_PATH"
          echo "TROJAN_PATH : $TROJAN_PATH"
          echo "SS_PATH     : $SS_PATH"

          # Write to GITHUB_OUTPUT using heredoc to safely handle slashes
          {
            echo "uuid=$UUID"
            echo "vless_path<<DELIM"
            echo "$VLESS_PATH"
            echo "DELIM"
            echo "vmess_path<<DELIM"
            echo "$VMESS_PATH"
            echo "DELIM"
            echo "trojan_path<<DELIM"
            echo "$TROJAN_PATH"
            echo "DELIM"
            echo "ss_path<<DELIM"
            echo "$SS_PATH"
            echo "DELIM"
          } >> $GITHUB_OUTPUT

      - name: Install cloudflared
        run: |
          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Start tunnel and print VLESS config
        run: |
          cloudflared tunnel \
            --url http://localhost:${{ github.event.inputs.port }} \
            --no-autoupdate \
            --logfile /tmp/cf.log \
            2>&1 &

          echo "Waiting for tunnel URL..."
          for i in $(seq 1 20); do
            TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then break; fi
            sleep 3
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "ERROR: Tunnel URL not found. Dumping cf.log:"
            cat /tmp/cf.log
            exit 1
          fi

          HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
          UUID="${{ steps.config.outputs.uuid }}"
          VLESS_PATH="${{ steps.config.outputs.vless_path }}"
          VMESS_PATH="${{ steps.config.outputs.vmess_path }}"
          TROJAN_PATH="${{ steps.config.outputs.trojan_path }}"
          SS_PATH="${{ steps.config.outputs.ss_path }}"
          SERVICE_NAME="${{ github.event.inputs.service_name }}"
          SNI="api.paymaya.com"
          PROXY_HOST="google.com"

          PATH_ENC=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$VLESS_PATH")

          VLESS_LINK="vless://${UUID}@${HOST}:443?encryption=none&security=tls&sni=${SNI}&type=ws&host=${PROXY_HOST}&path=${PATH_ENC}&fp=chrome#${SERVICE_NAME}"

          echo "======================================"
          echo "SERVICE     : $SERVICE_NAME"
          echo "TUNNEL URL  : $TUNNEL_URL"
          echo "UUID        : $UUID"
          echo "SNI         : $SNI"
          echo "PROXY HOST  : $PROXY_HOST:443"
          echo "======================================"
          echo "VLESS LINK  :"
          echo "$VLESS_LINK"
          echo "--------------------------------------"
          echo "VMESS PATH  : $VMESS_PATH"
          echo "TROJAN PATH : $TROJAN_PATH"
          echo "SS PATH     : $SS_PATH"
          echo "======================================"

      - name: Keep alive
        run: |
          while true; do
            STATUS=$(docker inspect -f '{{.State.Status}}' vless 2>/dev/null || echo "gone")
            echo "[$(date -u +%H:%M:%S)] Container status: $STATUS"
            if [ "$STATUS" != "running" ]; then
              echo "Container stopped. Dumping logs:"
              docker logs vless
              exit 1
            fi
            sleep 60
          done

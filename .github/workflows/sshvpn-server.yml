name: Create VPN Server

env:
  SSH_USER: ""
  SSH_PASS: ""
  OVPN_TCP_PORT: "443"
  OVPN_UDP_PORT: "1194"
  WG_PORT: "51820"
  WS_SSH_PORT: "80"
  ENABLE_WIREGUARD: "true"
  ENABLE_WS_SSH: "true"
  VPN_DNS_1: "1.1.1.1"
  VPN_DNS_2: "1.0.0.1"

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: "ngrok authtoken"
        required: true
      ssh_user:
        description: "SSH username (blank = auto)"
        required: false
        default: ""
      ssh_pass:
        description: "SSH password (blank = auto)"
        required: false
        default: ""
      enable_wireguard:
        description: "Enable WireGuard (true/false)"
        required: false
        default: "true"
      enable_ws_ssh:
        description: "Enable WebSocket SSH (true/false)"
        required: false
        default: "true"

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Resolve credentials
        run: |
          INPUT_USER="${{ github.event.inputs.ssh_user }}"
          INPUT_PASS="${{ github.event.inputs.ssh_pass }}"

          if   [ -n "$INPUT_USER" ];  then FINAL_USER="$INPUT_USER"
          elif [ -n "$SSH_USER" ];    then FINAL_USER="$SSH_USER"
          else FINAL_USER="user$(shuf -i 1000-9999 -n 1)"
          fi

          if   [ -n "$INPUT_PASS" ];  then FINAL_PASS="$INPUT_PASS"
          elif [ -n "$SSH_PASS" ];    then FINAL_PASS="$SSH_PASS"
          else FINAL_PASS="$(openssl rand -base64 12 | tr -d '/+=')$(shuf -i 10-99 -n 1)"
          fi

          ENA_WG="${{ github.event.inputs.enable_wireguard }}"
          ENA_WS="${{ github.event.inputs.enable_ws_ssh }}"
          [ -z "$ENA_WG" ] && ENA_WG="$ENABLE_WIREGUARD"
          [ -z "$ENA_WS" ] && ENA_WS="$ENABLE_WS_SSH"

          PUBLIC_IFACE=$(ip route | awk '/default/ {print $5}' | head -n1)

          echo "FINAL_USER=$FINAL_USER"     >> $GITHUB_ENV
          echo "FINAL_PASS=$FINAL_PASS"     >> $GITHUB_ENV
          echo "ENA_WG=$ENA_WG"             >> $GITHUB_ENV
          echo "ENA_WS=$ENA_WS"             >> $GITHUB_ENV
          echo "PUBLIC_IFACE=$PUBLIC_IFACE" >> $GITHUB_ENV

          echo "User  : $FINAL_USER"
          echo "Pass  : $FINAL_PASS"
          echo "WG    : $ENA_WG"
          echo "WS    : $ENA_WS"
          echo "Iface : $PUBLIC_IFACE"

      - name: IP forwarding + iptables
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1
          sudo iptables -t nat -A POSTROUTING -o $PUBLIC_IFACE -j MASQUERADE
          sudo iptables -A FORWARD -i tun0 -j ACCEPT
          sudo iptables -A FORWARD -o tun0 -j ACCEPT
          sudo iptables -A FORWARD -i tun1 -j ACCEPT
          sudo iptables -A FORWARD -o tun1 -j ACCEPT
          echo "IP forwarding enabled on $PUBLIC_IFACE"

      - name: Install packages
        run: |
          sudo apt-get update -qq
          PKGS="openvpn easy-rsa openssh-server curl unzip"
          [ "$ENA_WG" = "true" ] && PKGS="$PKGS wireguard"
          [ "$ENA_WS" = "true" ] && PKGS="$PKGS websockify"
          sudo apt-get install -y -qq $PKGS
          echo "Packages installed"

      - name: Create SSH user
        run: |
          sudo useradd -m -s /bin/bash $FINAL_USER || true
          echo "$FINAL_USER:$FINAL_PASS" | sudo chpasswd
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config

          printf '\nMatch User %s\n  PasswordAuthentication yes\n  AllowTcpForwarding yes\n  GatewayPorts yes\n  PermitTunnel yes\n' \
            "$FINAL_USER" | sudo tee -a /etc/ssh/sshd_config

          sudo systemctl enable ssh
          sudo systemctl restart ssh
          echo "SSH user created: $FINAL_USER"

      - name: Start WebSocket SSH bridge
        if: env.ENA_WS == 'true'
        run: |
          sudo nohup websockify 0.0.0.0:$WS_SSH_PORT localhost:22 > /tmp/ws.log 2>&1 &
          sleep 2
          echo "WebSocket SSH bridge on port $WS_SSH_PORT"

      - name: Build PKI
        run: |
          make-cadir ~/openvpn-ca
          cd ~/openvpn-ca
          export EASYRSA_BATCH=1
          export EASYRSA_REQ_CN="GH-VPN"
          ./easyrsa init-pki
          ./easyrsa build-ca nopass
          ./easyrsa gen-req server nopass
          ./easyrsa sign-req server server
          ./easyrsa gen-dh
          ./easyrsa gen-req client1 nopass
          ./easyrsa sign-req client client1
          openvpn --genkey secret pki/ta.key
          sudo cp pki/ca.crt             /etc/openvpn/ca.crt
          sudo cp pki/issued/server.crt  /etc/openvpn/server.crt
          sudo cp pki/private/server.key /etc/openvpn/server.key
          sudo cp pki/dh.pem             /etc/openvpn/dh.pem
          sudo cp pki/ta.key             /etc/openvpn/ta.key
          echo "PKI built"

      - name: Configure + start OpenVPN
        run: |
          # Write TCP config using python to avoid heredoc indentation issues
          python3 -c "
          import os
          cfg = '''port {tcp}
proto tcp
dev tun0
ca   /etc/openvpn/ca.crt
cert /etc/openvpn/server.crt
key  /etc/openvpn/server.key
dh   /etc/openvpn/dh.pem
tls-auth /etc/openvpn/ta.key 0
server 10.8.0.0 255.255.255.0
push redirect-gateway def1 bypass-dhcp
push dhcp-option DNS {dns1}
push dhcp-option DNS {dns2}
keepalive 10 120
cipher AES-256-GCM
auth SHA256
compress lz4-v2
push compress lz4-v2
user nobody
group nogroup
persist-key
persist-tun
verb 3
explicit-exit-notify
'''.format(
              tcp=os.environ['OVPN_TCP_PORT'],
              dns1=os.environ['VPN_DNS_1'],
              dns2=os.environ['VPN_DNS_2']
          ).replace('push ', 'push \"').replace('bypass-dhcp', 'bypass-dhcp\"').replace('lz4-v2\n', 'lz4-v2\"\n')
          open('/tmp/server-tcp.conf','w').write(cfg)
          "

          # Write UDP config
          python3 -c "
          import os
          cfg = '''port {udp}
proto udp
dev tun1
ca   /etc/openvpn/ca.crt
cert /etc/openvpn/server.crt
key  /etc/openvpn/server.key
dh   /etc/openvpn/dh.pem
tls-auth /etc/openvpn/ta.key 0
server 10.9.0.0 255.255.255.0
push \"redirect-gateway def1 bypass-dhcp\"
push \"dhcp-option DNS {dns1}\"
push \"dhcp-option DNS {dns2}\"
keepalive 10 120
cipher AES-256-GCM
auth SHA256
compress lz4-v2
push \"compress lz4-v2\"
user nobody
group nogroup
persist-key
persist-tun
verb 3
explicit-exit-notify 1
'''.format(
              udp=os.environ['OVPN_UDP_PORT'],
              dns1=os.environ['VPN_DNS_1'],
              dns2=os.environ['VPN_DNS_2']
          )
          open('/tmp/server-udp.conf','w').write(cfg)
          "

          sudo cp /tmp/server-tcp.conf /etc/openvpn/server-tcp.conf
          sudo cp /tmp/server-udp.conf /etc/openvpn/server-udp.conf

          sudo openvpn --daemon --config /etc/openvpn/server-tcp.conf
          sudo openvpn --daemon --config /etc/openvpn/server-udp.conf
          sleep 3
          ip link show tun0 && echo "tun0 OpenVPN TCP up"
          ip link show tun1 && echo "tun1 OpenVPN UDP up"

      - name: Setup WireGuard
        if: env.ENA_WG == 'true'
        run: |
          wg genkey | sudo tee /etc/wireguard/server_priv | wg pubkey | sudo tee /etc/wireguard/server_pub
          wg genkey | tee /tmp/wg_client_priv | wg pubkey | tee /tmp/wg_client_pub

          SERVER_PRIV=$(sudo cat /etc/wireguard/server_priv)
          CLIENT_PUB=$(cat /tmp/wg_client_pub)

          python3 -c "
          import os
          cfg = '''[Interface]
Address    = 10.10.0.1/24
ListenPort = {wg_port}
PrivateKey = {srv_priv}
PostUp     = iptables -t nat -A POSTROUTING -o {iface} -j MASQUERADE; iptables -A FORWARD -i wg0 -j ACCEPT
PostDown   = iptables -t nat -D POSTROUTING -o {iface} -j MASQUERADE; iptables -D FORWARD -i wg0 -j ACCEPT

[Peer]
PublicKey  = {cli_pub}
AllowedIPs = 10.10.0.2/32
'''.format(
              wg_port=os.environ['WG_PORT'],
              iface=os.environ['PUBLIC_IFACE'],
              srv_priv=open('/etc/wireguard/server_priv').read().strip(),
              cli_pub=open('/tmp/wg_client_pub').read().strip()
          )
          open('/tmp/wg0.conf','w').write(cfg)
          "

          sudo cp /tmp/wg0.conf /etc/wireguard/wg0.conf
          sudo systemctl enable --now wg-quick@wg0
          echo "WireGuard up on UDP $WG_PORT"

      - name: Setup ngrok
        run: |
          curl -sL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | \
            sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | \
            sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y -qq ngrok

          ngrok config add-authtoken "${{ github.event.inputs.ngrok_token }}"

          # Write ngrok config using python to avoid indentation issues
          python3 -c "
          import os
          cfg = '''version: \"2\"
tunnels:
  ssh-raw:
    proto: tcp
    addr: 22
  openvpn-tcp:
    proto: tcp
    addr: {ovpn_tcp}
  ws-ssh:
    proto: http
    addr: {ws_port}
    websocket_tcp_converter: true
'''.format(
              ovpn_tcp=os.environ['OVPN_TCP_PORT'],
              ws_port=os.environ['WS_SSH_PORT']
          )
          open('/tmp/ngrok.yml','w').write(cfg)
          "

          ngrok start --all --config /tmp/ngrok.yml --log /tmp/ngrok.log &
          sleep 8
          echo "ngrok tunnels started"

      - name: Print connection info
        run: |
          sleep 5
          API=$(curl -s http://127.0.0.1:4040/api/tunnels)
          RUNNER_IP=$(curl -s https://ifconfig.me)

          get_addr() {
            echo "$API" | python3 -c "
import sys, json
data = json.load(sys.stdin)
for t in data.get('tunnels', []):
    if t.get('name') == '$1':
        print(t['public_url'].replace('tcp://','').replace('https://','').replace('http://',''))
"
          }

          get_url() {
            echo "$API" | python3 -c "
import sys, json
data = json.load(sys.stdin)
for t in data.get('tunnels', []):
    if t.get('name') == '$1':
        print(t['public_url'])
"
          }

          SSH_ADDR=$(get_addr ssh-raw)
          OVPN_ADDR=$(get_addr openvpn-tcp)
          WS_URL=$(get_url ws-ssh)
          WS_ADDR=$(get_addr ws-ssh)

          SSH_HOST=$(echo "$SSH_ADDR"  | cut -d: -f1)
          SSH_PORT=$(echo "$SSH_ADDR"  | cut -d: -f2)
          OVPN_HOST=$(echo "$OVPN_ADDR" | cut -d: -f1)
          OVPN_PORT=$(echo "$OVPN_ADDR" | cut -d: -f2)

          # Generate .ovpn using python
          python3 -c "
import subprocess, os

ca   = open('/etc/openvpn/ca.crt').read().strip()
cert = open(os.path.expanduser('~/openvpn-ca/pki/issued/client1.crt')).read().strip()
key  = open(os.path.expanduser('~/openvpn-ca/pki/private/client1.key')).read().strip()
ta   = open('/etc/openvpn/ta.key').read().strip()

host = '$OVPN_HOST'
port = '$OVPN_PORT'

ovpn = '''client
dev tun
proto tcp
remote {host} {port}
resolv-retry infinite
nobind
persist-key
persist-tun
remote-cert-tls server
cipher AES-256-GCM
auth SHA256
compress lz4-v2
verb 3
key-direction 1
<ca>
{ca}
</ca>
<cert>
{cert}
</cert>
<key>
{key}
</key>
<tls-auth>
{ta}
</tls-auth>
'''.format(host=host, port=port, ca=ca, cert=cert, key=key, ta=ta)

open('/tmp/client1.ovpn','w').write(ovpn)
print('client1.ovpn written')
"

          # Generate WireGuard client config
          if [ "$ENA_WG" = "true" ]; then
            python3 -c "
import os
srv_pub    = open('/etc/wireguard/server_pub').read().strip()
client_priv = open('/tmp/wg_client_priv').read().strip()
runner_ip   = '$RUNNER_IP'
wg_port     = os.environ['WG_PORT']
dns         = os.environ['VPN_DNS_1']
cfg = '''[Interface]
PrivateKey = {priv}
Address    = 10.10.0.2/24
DNS        = {dns}

[Peer]
PublicKey           = {pub}
Endpoint            = {ip}:{port}
AllowedIPs          = 0.0.0.0/0
PersistentKeepalive = 25
'''.format(priv=client_priv, dns=dns, pub=srv_pub, ip=runner_ip, port=wg_port)
open('/tmp/wg-client.conf','w').write(cfg)
print('wg-client.conf written')
"
          fi

          echo ""
          echo "================================================"
          echo "             VPN SERVER READY"
          echo "================================================"
          echo ""
          echo "CREDENTIALS"
          echo "  Username : $FINAL_USER"
          echo "  Password : $FINAL_PASS"
          echo ""
          echo "RAW SSH"
          echo "  ssh $FINAL_USER@$SSH_HOST -p $SSH_PORT"
          echo "  e.g. ssh $FINAL_USER@6.tcp.ngrok.io -p 12345"
          echo ""
          echo "WEBSOCKET SSH (port $WS_SSH_PORT)"
          echo "  URL : $WS_URL"
          echo "  WSS : wss://$WS_ADDR"
          echo "  e.g. wss://a1b2c3d4.ngrok-free.app"
          echo ""
          echo "OPENVPN TCP (via ngrok)"
          echo "  Remote : $OVPN_HOST $OVPN_PORT"
          echo "  e.g.   : remote 6.tcp.ngrok.io 15443"
          echo ""
          echo "OPENVPN UDP (direct)"
          echo "  Remote : $RUNNER_IP $OVPN_UDP_PORT"
          echo ""
          if [ "$ENA_WG" = "true" ]; then
            echo "WIREGUARD"
            echo "  Endpoint : $RUNNER_IP:$WG_PORT"
            echo "  e.g.     : 35.198.x.x:51820"
            echo ""
          fi
          echo "================================================"
          echo "  Runner: 2 vCPU | 7 GB RAM | max 6h session"
          echo "================================================"
          echo ""
          echo "--- client1.ovpn ---"
          cat /tmp/client1.ovpn
          echo ""
          if [ "$ENA_WG" = "true" ]; then
            echo "--- wg-client.conf ---"
            cat /tmp/wg-client.conf
          fi

      - name: Keep alive
        run: sleep 21400
